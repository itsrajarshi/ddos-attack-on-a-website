<!doctype html>
<html>
  <head>
    <title>ShopSecure</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <a class="navbar-brand" href="/">ShopSecure</a>

      <div>
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        <a href="/products" class="btn btn-outline-light btn-sm">Products</a>
        <a href="/cart" class="btn btn-outline-light btn-sm">Cart</a>
        <a href="/admin/dashboard" class="btn btn-warning btn-sm">Dashboard</a>
      </div>
    </nav>

    <!-- Content -->
    <div class="container mt-4 content">{% block content %}{% endblock %}</div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
      CNS DDoS Case Study Project
    </footer>
  </body>
</html>
