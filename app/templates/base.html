<!doctype html>
<html>
  <head>
    <!-- Page title displayed in browser tab -->
    <title>ShopSecure</title>

    <!-- Bootstrap CSS for styling (via CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Ensure full height for proper layout */
      html,
      body {
        height: 100%;
      }

      /* Use flexbox to structure page (header + content + footer) */
      body {
        display: flex;
        flex-direction: column;
      }

      /* Make main content take remaining space */
      .content {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <!-- Brand / Logo -->
      <a class="navbar-brand" href="/">ShopSecure</a>

      <!-- Navigation links -->
      <div>
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        <a href="/products" class="btn btn-outline-light btn-sm">Products</a>
        <a href="/cart" class="btn btn-outline-light btn-sm">Cart</a>
        <a href="/admin/dashboard" class="btn btn-warning btn-sm">
          Dashboard
        </a>
      </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <!-- Jinja template block for dynamic page content -->
    <div class="container mt-4 content">{% block content %} {% endblock %}</div>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-dark text-white text-center p-3">
      <!-- Project footer text -->
      CNS DDoS Case Study Project
    </footer>
  </body>
</html>
